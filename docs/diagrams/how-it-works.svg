<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 860" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <rect width="1060" height="860" fill="#F6F8F7"/>
  <text x="60" y="58" font-size="30" font-weight="700" fill="#1B2731">How Neuro-Stream works</text>
  <text x="60" y="88" font-size="16" fill="#5D6C75">Simple cutaway, seen from the side. The front of the machine (where your glass goes) is on the right.</text>

  <!-- countertop -->
  <line x1="40" y1="790" x2="1020" y2="790" stroke="#1B2731" stroke-width="3"/>
  <text x="880" y="812" font-size="13" fill="#5D6C75">countertop</text>

  <!-- machine base body -->
  <path d="M150 600 L150 775 Q150 790 165 790 L600 790 L600 640 Q600 620 620 620 L740 620 L740 790 L775 790 Q790 790 790 775 L790 600 Z" fill="#E2E8E6" stroke="#1B2731" stroke-width="2.5"/>
  <!-- deck line -->
  <line x1="150" y1="600" x2="790" y2="600" stroke="#1B2731" stroke-width="2.5"/>

  <!-- lid dome -->
  <path d="M150 340 Q150 300 200 296 L740 296 Q790 300 790 340 L790 600" fill="none" stroke="#8FA5A0" stroke-width="3" stroke-dasharray="7 6"/>
  <line x1="150" y1="600" x2="150" y2="340" stroke="#8FA5A0" stroke-width="3" stroke-dasharray="7 6"/>
  <circle cx="150" cy="330" r="8" fill="#8FA5A0"/>

  <!-- water tank (center) -->
  <rect x="400" y="360" width="140" height="240" rx="8" fill="#DFF0EE" stroke="#0E8C7F" stroke-width="2.5"/>
  <text x="470" y="475" font-size="15" font-weight="600" fill="#0A6B61" text-anchor="middle">WATER</text>
  <text x="470" y="495" font-size="15" font-weight="600" fill="#0A6B61" text-anchor="middle">TANK</text><text x="470" y="517" font-size="12" fill="#0A6B61" text-anchor="middle">(lifts out)</text>

  <!-- left cartridge (ingredient) -->
  <rect x="210" y="370" width="90" height="200" rx="10" fill="#FFFFFF" stroke="#1B2731" stroke-width="2.5"/>
  <rect x="238" y="570" width="34" height="26" fill="#FFFFFF" stroke="#1B2731" stroke-width="2.5"/>
  <path d="M226 386 L284 386 L284 470 L255 500 L226 470 Z" fill="#F3E2C8" stroke="#C89B55" stroke-width="1.5"/>
  <text x="255" y="445" font-size="12" fill="#8a6b30" text-anchor="middle">powder</text>

  <!-- right cartridge (over dispense station) -->
  <rect x="590" y="370" width="90" height="200" rx="10" fill="#FFFFFF" stroke="#1B2731" stroke-width="2.5"/>
  <rect x="618" y="570" width="34" height="26" fill="#FFFFFF" stroke="#1B2731" stroke-width="2.5"/>
  <path d="M606 386 L664 386 L664 470 L635 500 L606 470 Z" fill="#D9E9F7" stroke="#5B8DB8" stroke-width="1.5"/>
  <text x="635" y="445" font-size="12" fill="#39638c" text-anchor="middle">liquid</text>

  <!-- mixing chamber under right cartridge -->
  <path d="M600 610 L670 610 L646 650 L624 650 Z" fill="#BFE8E2" stroke="#0E8C7F" stroke-width="2.5"/>
  <rect x="624" y="650" width="22" height="22" fill="#BFE8E2" stroke="#0E8C7F" stroke-width="2.5"/>

  <!-- glass in bay -->
  <path d="M610 700 L660 700 L655 780 L615 780 Z" fill="#FFFFFF" stroke="#1B2731" stroke-width="2.5"/>
  <!-- scale platform -->
  <rect x="596" y="780" width="78" height="10" rx="4" fill="#40565F"/>

  <!-- screen on front face -->
  <rect x="765" y="620" width="18" height="56" rx="4" fill="#1B2731" transform="rotate(8 774 648)"/>

  <!-- pump + heater in base -->
  <rect x="250" y="690" width="80" height="60" rx="6" fill="#CDE3C8" stroke="#4E7D46" stroke-width="2.5"/>
  <text x="290" y="726" font-size="13" font-weight="600" fill="#3A6134" text-anchor="middle">PUMP</text>
  <rect x="380" y="690" width="120" height="60" rx="6" fill="#F6CFC5" stroke="#B44A3C" stroke-width="2.5"/>
  <text x="440" y="719" font-size="13" font-weight="600" text-anchor="middle" fill="#8F3327">HEATER</text>
  <text x="440" y="737" font-size="11" fill="#8F3327" text-anchor="middle">heats as water flows</text>

  <!-- WATER PATH (teal, numbered) -->
  <g stroke="#0E8C7F" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M470 600 L470 660 L340 660 L290 660 L290 690"/>
    <path d="M330 720 L380 720"/>
    <path d="M500 720 L560 720 L560 636 L600 630"/>
  </g>
  <g fill="#0E8C7F">
    <circle cx="470" cy="632" r="13"/><circle cx="355" cy="720" r="13"/><circle cx="560" cy="676" r="13"/><circle cx="635" cy="688" r="13"/>
  </g>
  <g fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">
    <text x="470" y="637">1</text><text x="355" y="725">2</text><text x="560" y="681">3</text><text x="635" y="693">4</text>
  </g>
  <!-- drink into glass -->
  <path d="M635 672 L635 700" stroke="#0E8C7F" stroke-width="4" stroke-linecap="round"/>
  <!-- ingredient drop arrow -->
  <path d="M635 596 L635 612" stroke="#B44A3C" stroke-width="4" stroke-linecap="round"/>
  <path d="M628 606 L635 616 L642 606" fill="none" stroke="#B44A3C" stroke-width="4" stroke-linecap="round"/>

  <!-- carousel rotation hint -->
  <path d="M300 340 Q470 306 640 340" fill="none" stroke="#5D6C75" stroke-width="2" stroke-dasharray="5 5"/>
  <path d="M628 332 L642 341 L626 348" fill="none" stroke="#5D6C75" stroke-width="2"/>
  <text x="470" y="326" font-size="13" fill="#5D6C75" text-anchor="middle">ring rotates the chosen cartridge to the front</text>

  <!-- LABELS with leader lines -->
  <g stroke="#5D6C75" stroke-width="1.5">
    <line x1="150" y1="330" x2="112" y2="296"/>
    <line x1="240" y1="370" x2="140" y2="276"/>
    
    <line x1="635" y1="370" x2="760" y2="240"/>
    <line x1="670" y1="628" x2="830" y2="560"/>
    <line x1="782" y1="640" x2="850" y2="620"/>
    <line x1="674" y1="785" x2="830" y2="740"/>
    <line x1="290" y1="750" x2="240" y2="820"/>
    <line x1="440" y1="750" x2="470" y2="820"/>
  </g>
  <g font-size="15" font-weight="600" fill="#1B2731">
    <text x="46" y="288">Lid hinge (back)</text>
    <text x="60" y="252">Ingredient</text>
    
    <text x="766" y="232">Cartridge being used</text>
    <text x="836" y="556">Mixing chamber + spout</text>
    <text x="856" y="624">Touchscreen</text>
    <text x="836" y="744">Built-in scale</text>
    <text x="240" y="840" text-anchor="end">Quiet pump</text>
    <text x="476" y="840">Instant heater (1,200 W)</text>
  </g>
  <g font-size="13" fill="#5D6C75">
    <text x="60" y="270" font-size="13" fill="#5D6C75">cartridges ×10 (+1 cleaning)</text>
    <text x="766" y="250">its dose drops into the water stream</text>
    <text x="836" y="574">drink comes out already mixed</text>
    <text x="836" y="762">checks glass + verifies doses</text>
  </g>

  <!-- flow legend -->
  <rect x="60" y="120" width="430" height="118" rx="10" fill="#EAF1EF" stroke="#D9E1DE"/>
  <text x="80" y="148" font-size="14" font-weight="700" fill="#0A6B61">THE WATER'S JOURNEY</text>
  <g font-size="14" fill="#1B2731">
    <text x="80" y="174">1&#160;&#160;Tank releases water down into the base</text>
    <text x="80" y="196">2&#160;&#160;Pump pushes it through the heater — exact temperature</text>
    <text x="80" y="218">3&#160;&#160;Hot water swirls into the mixing chamber; <tspan fill="#B44A3C" font-weight="600">dose drops in</tspan></text>
  </g>
  <text x="80" y="240" font-size="14" fill="#1B2731">4&#160;&#160;Finished drink pours into your glass</text>
</svg>
