<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 940" font-family="ui-monospace, SF Mono, Menlo, Consolas, monospace">
  <rect width="1240" height="940" fill="#FBFCFC"/>
  <text x="50" y="52" font-size="26" font-weight="700" fill="#1B2731" font-family="system-ui,sans-serif">MVP wiring schematic</text>
  <text x="50" y="78" font-size="14" fill="#5D6C75" font-family="system-ui,sans-serif">Bench MVP — one dispense station. Red = mains voltage (danger). Orange = 12 V. Blue = logic/data (3.3 V).</text>

  <!-- ================= MAINS SECTION (left, red) ================= -->
  <rect x="50" y="110" width="270" height="330" rx="10" fill="#FDF1EF" stroke="#B44A3C" stroke-width="2"/>
  <text x="70" y="138" font-size="13" font-weight="700" fill="#B44A3C">MAINS 120/230 V — KEEP ISOLATED</text>

  <rect x="70" y="155" width="110" height="44" rx="6" fill="#fff" stroke="#B44A3C" stroke-width="1.5"/>
  <text x="125" y="176" font-size="12" text-anchor="middle" fill="#1B2731">AC inlet</text>
  <text x="125" y="191" font-size="11" text-anchor="middle" fill="#5D6C75">IEC C14 + 10 A fuse</text>

  <rect x="70" y="230" width="110" height="44" rx="6" fill="#fff" stroke="#B44A3C" stroke-width="1.5"/>
  <text x="125" y="251" font-size="12" text-anchor="middle" fill="#1B2731">PSU 12 V 5 A</text>
  <text x="125" y="266" font-size="11" text-anchor="middle" fill="#5D6C75">enclosed, earthed</text>

  <rect x="200" y="155" width="100" height="44" rx="6" fill="#fff" stroke="#B44A3C" stroke-width="1.5"/>
  <text x="250" y="176" font-size="12" text-anchor="middle" fill="#1B2731">SSR 25 A</text>
  <text x="250" y="191" font-size="11" text-anchor="middle" fill="#5D6C75">zero-cross</text>

  <rect x="200" y="230" width="100" height="58" rx="6" fill="#fff" stroke="#B44A3C" stroke-width="1.5"/>
  <text x="250" y="251" font-size="12" text-anchor="middle" fill="#1B2731">2× thermal</text>
  <text x="250" y="266" font-size="12" text-anchor="middle" fill="#1B2731">cutoffs</text>
  <text x="250" y="281" font-size="11" text-anchor="middle" fill="#5D6C75">in series, on heater</text>

  <rect x="200" y="320" width="100" height="50" rx="6" fill="#F6CFC5" stroke="#B44A3C" stroke-width="2"/>
  <text x="250" y="342" font-size="12" font-weight="700" text-anchor="middle" fill="#8F3327">HEATER</text>
  <text x="250" y="358" font-size="11" text-anchor="middle" fill="#8F3327">1200 W inline</text>

  <text x="70" y="415" font-size="11" fill="#B44A3C">⚠ GFCI outlet · earth the heater body ·</text>
  <text x="70" y="430" font-size="11" fill="#B44A3C">no exposed terminals</text>

  <!-- mains wires -->
  <g stroke="#B44A3C" stroke-width="2.5" fill="none">
    <path d="M125 199 L125 230"/>
    <path d="M180 177 L200 177"/>
    <path d="M250 199 L250 230"/>
    <path d="M250 288 L250 320"/>
  </g>

  <!-- ================= 12V SECTION ================= -->
  <g stroke="#D98324" stroke-width="2.5" fill="none">
    <path d="M180 252 L370 252"/>          <!-- 12V to rail -->
  </g>
  <rect x="370" y="220" width="26" height="330" rx="6" fill="#FDF3E4" stroke="#D98324" stroke-width="2"/>
  <text x="383" y="400" font-size="12" font-weight="700" fill="#9A5B12" transform="rotate(-90 383 400)">12 V RAIL</text>

  <!-- Buck -->
  <rect x="440" y="230" width="120" height="44" rx="6" fill="#fff" stroke="#D98324" stroke-width="1.5"/>
  <text x="500" y="251" font-size="12" text-anchor="middle" fill="#1B2731">Buck 12→5 V 3 A</text>
  <text x="500" y="266" font-size="11" text-anchor="middle" fill="#5D6C75">feeds ESP32 devkit</text>
  <g stroke="#D98324" stroke-width="2.5"><path d="M396 252 L440 252"/></g>

  <!-- Pump w/ MOSFET -->
  <rect x="440" y="300" width="120" height="44" rx="6" fill="#fff" stroke="#D98324" stroke-width="1.5"/>
  <text x="500" y="321" font-size="12" text-anchor="middle" fill="#1B2731">Pump 12 V</text>
  <text x="500" y="336" font-size="11" text-anchor="middle" fill="#5D6C75">via MOSFET (IRLZ44N)</text>
  <g stroke="#D98324" stroke-width="2.5"><path d="M396 322 L440 322"/></g>

  <!-- TMC2209 drive -->
  <rect x="440" y="370" width="120" height="52" rx="6" fill="#fff" stroke="#D98324" stroke-width="1.5"/>
  <text x="500" y="390" font-size="12" text-anchor="middle" fill="#1B2731">TMC2209 #1</text>
  <text x="500" y="405" font-size="11" text-anchor="middle" fill="#5D6C75">drive motor</text>
  <text x="500" y="417" font-size="11" text-anchor="middle" fill="#5D6C75">StallGuard = jam sense</text>
  <g stroke="#D98324" stroke-width="2.5"><path d="M396 396 L440 396"/></g>

  <!-- TMC2209 #2 -->
  <rect x="440" y="440" width="120" height="52" rx="6" fill="#fff" stroke="#D98324" stroke-width="1.5"/>
  <text x="500" y="460" font-size="12" text-anchor="middle" fill="#1B2731">TMC2209 #2</text>
  <text x="500" y="475" font-size="11" text-anchor="middle" fill="#5D6C75">carousel motor</text>
  <text x="500" y="487" font-size="11" text-anchor="middle" fill="#5D6C75">(optional on bench)</text>
  <g stroke="#D98324" stroke-width="2.5"><path d="M396 466 L440 466"/></g>

  <!-- Motors -->
  <circle cx="640" cy="396" r="26" fill="#EAF1EF" stroke="#1B2731" stroke-width="2"/>
  <text x="640" y="392" font-size="11" text-anchor="middle" fill="#1B2731">NEMA17</text>
  <text x="640" y="405" font-size="10" text-anchor="middle" fill="#5D6C75">+1:5 gear</text>
  <circle cx="640" cy="466" r="26" fill="#EAF1EF" stroke="#1B2731" stroke-width="2"/>
  <text x="640" y="462" font-size="11" text-anchor="middle" fill="#1B2731">NEMA17</text>
  <text x="640" y="475" font-size="10" text-anchor="middle" fill="#5D6C75">pancake</text>
  <g stroke="#1B2731" stroke-width="2"><path d="M560 396 L614 396"/><path d="M560 466 L614 466"/></g>
  <text x="585" y="390" font-size="10" fill="#5D6C75">A+A−B+B−</text>
  <text x="585" y="460" font-size="10" fill="#5D6C75">A+A−B+B−</text>

  <!-- ================= ESP32 (center-right, blue) ================= -->
  <rect x="700" y="120" width="240" height="560" rx="10" fill="#EDF3F9" stroke="#3D6B99" stroke-width="2.5"/>
  <text x="820" y="148" font-size="15" font-weight="700" fill="#2B4D70" text-anchor="middle">ESP32-S3 DevKitC-1</text>
  <text x="820" y="166" font-size="11" fill="#5D6C75" text-anchor="middle">Wi-Fi + BLE on module</text>

  <!-- pin rows on left edge of ESP32 -->
  <g font-size="11.5" fill="#2B4D70">
    <text x="712" y="205">GPIO4  STEP1</text>
    <text x="712" y="228">GPIO5  DIR1</text>
    <text x="712" y="251">GPIO6  EN (both)</text>
    <text x="712" y="274">GPIO7  UART→TMC ×2</text>
    <text x="712" y="297">GPIO15 STEP2</text>
    <text x="712" y="320">GPIO16 DIR2</text>
    <text x="712" y="343">GPIO13 SSR gate</text>
    <text x="712" y="366">GPIO14 pump PWM</text>
    <text x="712" y="389">GPIO12 flow pulse</text>
    <text x="712" y="412">GPIO1  ADC NTC spout</text>
    <text x="712" y="435">GPIO2  ADC NTC heater</text>
    <text x="712" y="458">GPIO10 HX717 DOUT</text>
    <text x="712" y="481">GPIO11 HX717 SCK</text>
    <text x="712" y="504">GPIO8  I²C SDA (NFC)</text>
    <text x="712" y="527">GPIO9  I²C SCL (NFC)</text>
    <text x="712" y="550">GPIO17 dock hall sw</text>
    <text x="712" y="573">GPIO18 manifold sw</text>
    <text x="712" y="596">SPI2   display (5 pins)</text>
    <text x="712" y="619">5V/GND from buck</text>
    <text x="712" y="642">GPIO21 HW watchdog</text>
  </g>

  <!-- logic wires (blue) from ESP32 left edge to component column -->
  <g stroke="#3D6B99" stroke-width="1.8" fill="none">
    <path d="M700 200 L620 200 L620 370 L560 383"/>   <!-- step1/dir1/en bundle to TMC1 -->
    <path d="M700 292 L600 292 L600 445 L560 452"/>   <!-- step2/dir2 to TMC2 -->
    <path d="M700 338 L320 338 L320 177 L300 177"/>   <!-- SSR gate -->
    <path d="M700 361 L580 361 L580 330 L560 330"/>   <!-- pump -->
  </g>

  <!-- ================= SENSORS (right column) ================= -->
  <g>
    <rect x="990" y="180" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="200" font-size="12" text-anchor="middle" fill="#1B2731">Flow meter YF-S402B</text>
    <text x="1090" y="215" font-size="11" text-anchor="middle" fill="#5D6C75">pulse out → GPIO12</text>

    <rect x="990" y="246" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="266" font-size="12" text-anchor="middle" fill="#1B2731">NTC 100k ×2 (tee + clamp)</text>
    <text x="1090" y="281" font-size="11" text-anchor="middle" fill="#5D6C75">divider → GPIO1 / GPIO2</text>

    <rect x="990" y="312" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="332" font-size="12" text-anchor="middle" fill="#1B2731">Load cell 1 kg + HX717</text>
    <text x="1090" y="347" font-size="11" text-anchor="middle" fill="#5D6C75">under drip platform</text>

    <rect x="990" y="378" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="398" font-size="12" text-anchor="middle" fill="#1B2731">NFC PN532 (I²C mode)</text>
    <text x="1090" y="413" font-size="11" text-anchor="middle" fill="#5D6C75">antenna at dock collar</text>

    <rect x="990" y="444" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="464" font-size="12" text-anchor="middle" fill="#1B2731">2.8&#8221; IPS touch (SPI)</text>
    <text x="1090" y="479" font-size="11" text-anchor="middle" fill="#5D6C75">optional on bench</text>

    <rect x="990" y="510" width="200" height="46" rx="6" fill="#fff" stroke="#3D6B99" stroke-width="1.5"/>
    <text x="1090" y="530" font-size="12" text-anchor="middle" fill="#1B2731">Hall switch + reed switch</text>
    <text x="1090" y="545" font-size="11" text-anchor="middle" fill="#5D6C75">dock aligned / manifold on</text>
  </g>
  <g stroke="#3D6B99" stroke-width="1.8" fill="none">
    <path d="M940 385 L990 203"/>
    <path d="M940 408 L990 269"/>
    <path d="M940 470 L990 335"/>
    <path d="M940 516 L990 401"/>
    <path d="M940 592 L990 467"/>
    <path d="M940 562 L990 533"/>
  </g>

  <!-- ================= SAFETY BOX ================= -->
  <rect x="50" y="720" width="1140" height="180" rx="10" fill="#FDF1EF" stroke="#B44A3C" stroke-width="2"/>
  <text x="70" y="750" font-size="14" font-weight="700" fill="#B44A3C">SAFETY RULES FOR THE BENCH BUILD (non-negotiable)</text>
  <g font-size="13" fill="#1B2731" font-family="system-ui,sans-serif">
    <text x="70" y="778">1. Heater runs ONLY behind: GFCI outlet + both thermal cutoffs + the SSR + firmware interlock (GPIO13 AND hardware watchdog GPIO21 — if firmware hangs, heat dies).</text>
    <text x="70" y="802">2. Mains wiring lives in its own earthed metal box; only 12 V and logic leave it. If you are not comfortable wiring mains, buy a pre-built inline heater with its own controls,</text>
    <text x="70" y="822">&#160;&#160;&#160;&#160;or run the first tests cold — every dosing test works with room-temperature water.</text>
    <text x="70" y="846">3. Never run the heater with no flow (firmware boil-dry guard must be active before first hot test: flow &lt; 2 g/s → SSR off).</text>
    <text x="70" y="870">4. NTC dividers: 100 kΩ NTC + 100 kΩ 1% resistor to 3.3 V; both sensors epoxied — spout NTC in the outlet tee, body NTC clamped to heater shell.</text>
  </g>
</svg>
